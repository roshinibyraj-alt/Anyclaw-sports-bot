<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Gabagool Bot v8</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d1a;--bg2:#1a1a30;--bg3:#262644;--border:#3a3a66;--green:#00ff88;--red:#ff4466;--white:#e8e8f0;--muted:#8888aa;--gold:#ffcc00;--blue:#4488ff;--orange:#ff8844;--btc:#f7931a;--eth:#8888ff;--radius:6px;--font:13px}
body{background:var(--bg);color:var(--white);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:var(--font);line-height:1.3}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 8px;position:sticky;top:0;z-index:100}
.top-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.logo{font-weight:800;font-size:14px;display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.on{background:var(--green);box-shadow:0 0 10px var(--green)}
.dot.off{background:var(--red);box-shadow:0 0 10px var(--red)}
.stats{display:flex;gap:3px;flex-wrap:wrap;flex:1}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 5px;text-align:center;min-width:44px}
.stat .sl{font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px}
.stat .sv{font-size:11px;font-weight:800}
.stat .sv.g{color:var(--green)}.stat .sv.r{color:var(--red)}.stat .sv.y{color:var(--gold)}.stat .sv.b{color:var(--blue)}.stat .sv.o{color:var(--orange)}
main{padding:6px;max-width:860px;margin:0 auto}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px;margin-bottom:8px}
.card-title{font-size:10px;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);display:flex;justify-content:space-between}
.card-title span{color:var(--white);font-weight:400}
.note{background:rgba(68,136,255,0.06);border:1px solid var(--blue);border-radius:var(--radius);padding:6px;margin-bottom:8px;font-size:9px;color:var(--muted);line-height:1.4}
.window-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.w-cell{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:6px}
.w-cell.btc{border-left:3px solid var(--btc)}.w-cell.eth{border-left:3px solid var(--eth)}
.w-cell .wh{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:10px}
.w-cell .wh .w-asset{font-weight:800;font-size:11px;display:flex;gap:4px;align-items:center}
.w-cell .wh .w-type{background:var(--bg3);border-radius:3px;padding:1px 5px;font-size:8px;font-weight:700;color:var(--gold)}
.w-cell .wh .w-time{color:var(--muted);font-size:9px}
.w-cell .w-row{display:flex;gap:4px;margin-bottom:3px}
.w-cell .w-side{flex:1;padding:3px 5px;border-radius:4px;font-size:9px}
.w-cell .w-side.up{background:rgba(0,255,136,0.07)}.w-cell .w-side.down{background:rgba(255,68,102,0.07)}
.w-cell .w-side .ws-label{font-size:7px;text-transform:uppercase;color:var(--muted)}
.w-cell .w-side .ws-price{font-size:14px;font-weight:900}
.w-cell .w-side .ws-price.up{color:var(--green)}.w-cell .w-side .ws-price.down{color:var(--red)}
.w-cell .w-side .ws-book{font-size:7px;color:var(--muted)}
.w-cell .we{display:flex;gap:4px;margin-bottom:3px}
.w-cell .we .w-edge{background:var(--bg3);border-radius:3px;padding:2px 5px;font-size:8px;font-weight:600}
.w-cell .we .w-edge.pos{color:var(--green)}.w-cell .we .w-edge.neg{color:var(--red)}
.w-cell .wi{display:flex;gap:4px;font-size:8px;color:var(--muted);flex-wrap:wrap}
.w-cell .wi span{background:var(--bg3);border-radius:3px;padding:1px 4px}
.pos-card{background:var(--bg2);border:1px solid var(--green);border-radius:5px;padding:5px;margin-bottom:4px}
.pos-card.loss{border-color:var(--red)}
.pos-card .ph{display:flex;justify-content:space-between;margin-bottom:2px;font-size:10px}
.pos-card .ph .ph-asset{font-weight:700}
.pos-card .pd{display:flex;gap:5px;font-size:8px;color:var(--muted);flex-wrap:wrap}
.pos-card .pd span{color:var(--white);font-weight:600}
.pending-card{background:var(--bg2);border:1px dashed var(--gold);border-radius:5px;padding:5px;margin-bottom:4px}
.pending-card .ph{display:flex;justify-content:space-between;font-size:9px}
.pending-card .ph .ph-side{font-weight:700;color:var(--gold)}
.pending-card .pd{font-size:8px;color:var(--muted);display:flex;gap:4px;flex-wrap:wrap}
.trade-row{display:flex;align-items:center;gap:4px;padding:3px 5px;font-size:9px;border-bottom:1px solid rgba(58,58,102,0.3)}
.trade-row:last-child{border-bottom:none}
.empty-state{text-align:center;padding:14px;color:var(--muted);font-size:12px}
.footer{text-align:center;padding:6px;color:var(--muted);font-size:8px}
</style>
</head>
<body>
<header><div class="top-row"><div class="logo"><span class="dot off" id="dot"></span>Gabagool</div><div class="stats" id="headerStats"></div></div></header>
<main><div id="noteSection"></div><div id="marketSection"></div><div id="pendingSection"></div><div id="positionSection"></div><div id="historySection"></div><div class="footer" id="footer"></div></main>
<script>
(function(){
var socket = io({ transports: ['websocket', 'polling'], reconnection: true });
function fmt(v){return typeof v==='number'?v.toFixed(4):(v||'0');}
function fmt2(v){return typeof v==='number'?v.toFixed(2):(v||'0');}
function render(d){
  if(!d)return;
  document.getElementById('dot').className=d.connected?'dot on':'dot off';
  var eq=d.equity||d.balance||0,initEq=d.initialEquity||10000,pnl=eq-initEq,pnlPct=initEq?((pnl/initEq)*100).toFixed(1):'0';
  document.getElementById('headerStats').innerHTML=
    '<div class="stat"><div class="sl">Eq</div><div class="sv '+(eq>=initEq?'g':'r')+'">$'+fmt2(eq)+'</div></div>'+
    '<div class="stat"><div class="sl">PnL</div><div class="sv '+(pnl>=0?'g':'r')+'">'+(pnl>=0?'+':'')+'$'+fmt2(Math.abs(pnl))+' ('+pnlPct+'%)</div></div>'+
    '<div class="stat"><div class="sl">Win</div><div class="sv y">'+d.wins+'/'+d.totalTrades+'</div></div>'+
    '<div class="stat"><div class="sl">WR</div><div class="sv g">'+(d.winRate||0).toFixed(0)+'%</div></div>'+
    '<div class="stat"><div class="sl">Pos</div><div class="sv b">'+d.positionsCount+'</div></div>'+
    '<div class="stat"><div class="sl">Pend</div><div class="sv o">'+d.pendingCount+'</div></div>'+
    '<div class="stat"><div class="sl">Mkts</div><div class="sv o">'+d.activeMarkets+'</div></div>'+
    '<div class="stat"><div class="sl">Mult</div><div class="sv">'+(d.sizingMultiplier||1).toFixed(2)+'x</div></div>'<div class="stat"><div class="sl">Shares ▲▼</div><div class="sv g">'+(d.totalUpShares||0)+'/'+(d.totalDownShares||0)+'</div></div>';
  document.getElementById('noteSection').innerHTML='<div class="note">'+(d.note||'')+'</div>';
  var ms=document.getElementById('marketSection'),mkt=d.marketDisplay||[];
  if(mkt.length===0){ms.innerHTML='<div class="card"><div class="card-title">Live Windows</div><div class="empty-state">Waiting for next window...</div></div>';}
  else{
    var mh='<div class="card"><div class="card-title">Live Windows <span>'+mkt.length+'</span></div><div class="window-grid">';
    for(var i=0;i<mkt.length;i++){var m=mkt[i],asset=m.asset||'btc',rem=m.secondsToEnd||0,remStr=rem>60?Math.floor(rem/60)+'m '+(rem%60)+'s':rem+'s',wType=m.windowType||'15m';
      mh+='<div class="w-cell '+asset+'"><div class="wh"><span class="w-asset">'+asset.toUpperCase()+' <span class="w-type">'+wType+'</span></span><span class="w-time">⏱ '+remStr+'</span></div>'+
        '<div class="w-row"><div class="w-side up"><div class="ws-label">UP</div><div class="ws-price up">$'+fmt(m.upPrice)+'</div><div class="ws-book">Bid:'+fmt(m.upBid)+' Ask:'+fmt(m.upAsk)+'</div></div>'+
        '<div class="w-side down"><div class="ws-label">DOWN</div><div class="ws-price down">$'+fmt(m.downPrice)+'</div><div class="ws-book">Bid:'+fmt(m.downBid)+' Ask:'+fmt(m.downAsk)+'</div></div></div>'+
        '<div class="we"><span class="w-edge '+(m.edge>=0?'pos':'neg')+'">Edge: '+(m.edge>=0?'+':'')+(m.edge||0).toFixed(2)+'%</span></div>'+
        '<div class="wi"><span>Inv UP:'+(m.invUp||0)+'sh</span><span>Inv DN:'+(m.invDown||0)+'sh</span><span>Pend UP:'+(m.pendingUp||0)+' DN:'+(m.pendingDown||0)+'</span></div></div>';}
    mh+='</div></div>';ms.innerHTML=mh;}
  var pds=document.getElementById('pendingSection'),pend=d.pendingOrders||[];
  if(pend.length===0){pds.innerHTML='';}
  else{var ph='<div class="card"><div class="card-title">Pending Limit Orders <span>'+pend.length+'</span></div>';
    for(var i=0;i<pend.length;i++){var o=pend[i];ph+='<div class="pending-card"><div class="ph"><span class="ph-side">'+o.asset.toUpperCase()+' '+o.side+'</span><span>$'+fmt(o.price)+' × '+Math.round(o.shares)+'sh</span></div><div class="pd"><span>$'+fmt2(o.cost)+'</span> | ⏱'+o.secondsToEnd+'s | placed '+o.placedAgo+'s ago</div></div>';}
    ph+='</div>';pds.innerHTML=ph;}
  var ps=document.getElementById('positionSection'),pos=d.openPositions||[];
  if(pos.length===0){ps.innerHTML='<div class="card"><div class="card-title">Filled Positions (No TP/SL)</div><div class="empty-state">No filled positions — limit orders pending</div></div>';}
  else{var ph2='<div class="card"><div class="card-title">Filled Positions — No TP/SL <span>'+pos.length+'</span></div>';
    for(var i=0;i<pos.length;i++){var p=pos[i],cur=p.currentPrice||p.entryPrice,chg=p.entryPrice?((cur-p.entryPrice)/p.entryPrice*100):0,profit=chg>=0,asset=p.asset||'',rem=p.secondsToEnd||0,remStr=rem>60?Math.floor(rem/60)+'m '+(rem%60)+'s':rem+'s';
      ph2+='<div class="pos-card '+(profit?'':' loss')+'"><div class="ph"><span class="ph-asset">'+asset.toUpperCase()+' '+(p.outcome||'')+'</span><span style="color:'+(profit?'var(--green)':'var(--red)')+'">'+(chg>=0?'+':'')+chg.toFixed(1)+'%</span></div><div class="pd"><span>$'+fmt(p.entryPrice)+' → $'+fmt(cur)+'</span> | '+Math.round(p.shares)+'sh | $'+fmt2(p.cost)+' | ⏱'+remStr+'</div></div>';}
    ph2+='</div>';ps.innerHTML=ph2;}
  var ts=document.getElementById('historySection'),trades=d.trades||[];
  if(trades.length===0){ts.innerHTML='<div class="card"><div class="card-title">Resolved Trades <span>0</span></div><div class="empty-state">No resolved trades yet</div></div>';}
  else{var th='<div class="card"><div class="card-title">Resolved Trades <span>'+trades.length+'</span></div>';
    for(var i=0;i<Math.min(trades.length,20);i++){var t=trades[i],win=(t.pnl||0)>=0;
      th+='<div class="trade-row"><span style="font-weight:700;font-size:10px;'+(win?'color:var(--green)':'color:var(--red)')+'">'+(t.pnl>=0?'+':'')+fmt2(t.pnl)+'</span>'+
        '<span style="font-size:8px;color:var(--muted)">'+(t.asset||'').toUpperCase()+' '+t.direction+'</span>'+
        '<span style="font-size:8px;color:var(--muted)">$'+fmt(t.entryPrice)+'→$'+fmt(t.exitPrice)+'</span>'+
        '<span style="color:var(--muted);font-size:8px;margin-left:auto">'+t.reason+'</span></div>';}
    th+='</div>';ts.innerHTML=th;}
  var up=d.uptime||0;
  document.getElementById('footer').textContent='⏱ '+(up>3600?Math.floor(up/3600)+'h '+Math.floor((up%3600)/60)+'m':up>60?Math.floor(up/60)+'m '+up%60+'s':up+'s')+' | Expos: $'+fmt2(d.totalExposure||0)+'/'+fmt2(d.maxExposure||0)+' | Fees: $'+fmt2(d.totalFees||0)+' | Disc: '+d.discoveryCount;
}
socket.on('snapshot',function(d){if(d)render(d);});
setInterval(function(){fetch('/api/snapshot').then(function(r){return r.json();}).then(function(d){if(d)render(d);}).catch(function(){})},3000);
})();
</script>
</body>
</html>
