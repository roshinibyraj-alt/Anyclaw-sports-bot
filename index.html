<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Complete-Set Arb Dashboard</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;line-height:1.5}
header{background:#161b22;border-bottom:1px solid #30363d;padding:8px 12px;position:sticky;top:0;z-index:100}
.hrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.logo{font-weight:800;font-size:14px;color:#f0f6fc;white-space:nowrap}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:4px}
.dot.on{background:#3fb950;box-shadow:0 0 6px #3fb950}.dot.off{background:#f85149}
.badge{padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.5px}
.badge.live{background:#f8514922;color:#f85149;border:1px solid #f8514966}
.badge.green{background:#3fb95022;color:#3fb950;border:1px solid #3fb95066}
.badge.blue{background:#58a6ff22;color:#58a6ff;border:1px solid #58a6ff66}
.badge.warn{background:#d2992222;color:#d29922;border:1px solid #d2992266}
.stats{display:flex;gap:4px;flex-wrap:wrap}
.stat{background:#21262d;border:1px solid #30363d;border-radius:5px;padding:3px 8px;text-align:center;min-width:62px}
.stat .sl{font-size:8px;color:#8b949e;text-transform:uppercase;letter-spacing:.3px}
.stat .sv{font-size:13px;font-weight:700}
.g{color:#3fb950}.r{color:#f85149}.y{color:#d29922}.b{color:#58a6ff}.w{color:#f0f6fc}
main{padding:8px;max-width:900px;margin:0 auto}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px;margin-bottom:8px}
.card-title{font-size:9px;font-weight:700;margin-bottom:8px;text-transform:uppercase;color:#8b949e;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:600px){.grid2{grid-template-columns:1fr}}
.row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #21262d;font-size:11px}
.row:last-child{border-bottom:none}
.fill-row{display:flex;gap:6px;padding:3px 0;border-bottom:1px solid #21262d;font-size:10px;align-items:center}
.fill-row:last-child{border-bottom:none}
.log-line{font-size:10px;color:#8b949e;padding:2px 0;border-bottom:1px solid #0d1117;font-family:monospace}
.leg-box{padding:8px;border-radius:6px;text-align:center}
.leg-box.up{background:#0d2818}.leg-box.dn{background:#28150d}
.leg-label{font-size:8px;text-transform:uppercase;color:#8b949e;letter-spacing:.5px}
.leg-price{font-size:20px;font-weight:900;margin:2px 0}
.leg-info{font-size:9px;color:#8b949e}
.phase-maker{color:#58a6ff;background:#1f6feb22;border:1px solid #1f6feb55;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700}
.phase-endgame{color:#d29922;background:#d2992222;border:1px solid #d2992255;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700}
.phase-idle{color:#8b949e;background:#21262d;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700}
.empty{text-align:center;padding:20px;color:#484f58;font-size:12px}
footer{text-align:center;padding:8px;color:#484f58;font-size:9px}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="logo"><span class="dot off" id="dot"></span>Arb Bot</div>
    <span class="badge live" id="modeBadge">🔴 LIVE</span>
    <span class="badge warn" id="killBadge" style="display:none">⛔ KILL SWITCH ON</span>
    <div class="stats" id="headerStats"></div>
  </div>
</header>
<main>
  <div id="marketCard"></div>
  <div class="grid2">
    <div id="positionCard"></div>
    <div id="sessionCard"></div>
  </div>
  <div id="fillsCard"></div>
  <div id="logCard"></div>
</main>
<footer id="footer">Connecting...</footer>

<script>
(function(){
var socket = io({ transports:['websocket','polling'], reconnection:true });

function f2(v){ return typeof v==='number' ? v.toFixed(2) : '0.00'; }
function f4(v){ return typeof v==='number' ? v.toFixed(4) : '0.0000'; }
function cls(v){ return (v||0)>=0 ? 'g' : 'r'; }
function fmtRem(s){ if(!s||s<0) return 'ended'; return s>60 ? Math.floor(s/60)+'m '+(s%60)+'s' : s+'s'; }

function render(d){
  if(!d) return;
  var bal   = d.balance || 0;
  var start = d.startBalance || 0;
  var pnl   = d.pnl || 0;
  var mkt   = d.market || {};
  var pos   = d.position || null;
  var sess  = d.session || {};

  document.getElementById('dot').className = 'dot on';

  var kb = document.getElementById('killBadge');
  if(d.killSwitch){
    kb.style.display = 'inline';
    document.getElementById('modeBadge').style.display = 'none';
  } else {
    kb.style.display = 'none';
    document.getElementById('modeBadge').style.display = 'inline';
  }

  // Header stats
  var h = '';
  h += '<div class="stat"><div class="sl">Balance</div><div class="sv w">$'+f2(bal)+'</div></div>';
  h += '<div class="stat"><div class="sl">PnL</div><div class="sv '+cls(pnl)+'">'+(pnl>=0?'+':'')+f2(pnl)+'</div></div>';
  if(mkt.edge !== undefined){
    h += '<div class="stat"><div class="sl">Edge</div><div class="sv '+(mkt.hasEdge?'g':'r')+'">'+f4(mkt.edge)+'</div></div>';
  }
  h += '<div class="stat"><div class="sl">Pending</div><div class="sv b">'+(d.pendingOrders||0)+'</div></div>';
  document.getElementById('headerStats').innerHTML = h;

  // Market card
  var mc = '<div class="card"><div class="card-title">BTC 15m Window <span>'+fmtRem(mkt.secondsToEnd)+'</span></div>';
  if(mkt.active && mkt.hasClob){
    mc += '<div class="grid2">';
    mc += '<div class="leg-box up"><div class="leg-label">UP</div><div class="leg-price g">$'+f4(mkt.upMid)+'</div><div class="leg-info">bid $'+f4((mkt.upMid||0)-0.005)+' · ask $'+f4((mkt.upMid||0)+0.005)+'</div></div>';
    mc += '<div class="leg-box dn"><div class="leg-label">DOWN</div><div class="leg-price r">$'+f4(mkt.downMid)+'</div><div class="leg-info">bid $'+f4((mkt.downMid||0)-0.005)+' · ask $'+f4((mkt.downMid||0)+0.005)+'</div></div>';
    mc += '</div>';
    mc += '<div style="margin-top:8px;display:flex;gap:12px;align-items:center">';
    mc += '<span style="font-size:11px;color:#8b949e">Combined: <b class="w">$'+f4((mkt.upMid||0)+(mkt.downMid||0))+'</b></span>';
    mc += '<span style="font-size:11px;color:#8b949e">Edge: <b class="'+cls(mkt.edge)+'">'+f4(mkt.edge)+'</b></span>';
    mc += '<span class="badge '+(mkt.hasEdge?'green':'warn')+'">'+(mkt.hasEdge?'EDGE ✓':'NO EDGE')+'</span>';
    mc += '</div>';
  } else {
    mc += '<div class="empty">Scanning for active BTC 15m window...</div>';
  }
  mc += '</div>';
  document.getElementById('marketCard').innerHTML = mc;

  // Position card
  var pc = '<div class="card"><div class="card-title">Position</div>';
  if(pos){
    var imb = pos.imbalance || 0;
    var phase = pos.phase || 'idle';
    var phaseCls = phase==='maker' ? 'phase-maker' : (phase==='endgame' ? 'phase-endgame' : 'phase-idle');
    var phaseLabel = phase==='maker' ? 'MAKER' : (phase==='endgame' ? 'ENDGAME' : 'IDLE');
    pc += '<div class="row"><span>Phase</span><span class="'+phaseCls+'">'+phaseLabel+'</span></div>';
    pc += '<div class="row"><span>UP held</span><span class="g">'+pos.upHeld+' sh</span></div>';
    pc += '<div class="row"><span>DN held</span><span class="r">'+pos.dnHeld+' sh</span></div>';
    pc += '<div class="row"><span>Imbalance</span><span class="'+(Math.abs(imb)>9?'y':'w')+'">'+(imb>=0?'+':'')+imb+'</span></div>';
    pc += '<div class="row"><span>UP buy quote</span><span class="b">$'+f4(pos.upBuyPrice)+'</span></div>';
    pc += '<div class="row"><span>DN buy quote</span><span class="b">$'+f4(pos.dnBuyPrice)+'</span></div>';
    pc += '<div class="row"><span>UP cost basis</span><span>$'+f2(pos.upCost)+'</span></div>';
    pc += '<div class="row"><span>DN cost basis</span><span>$'+f2(pos.dnCost)+'</span></div>';
    pc += '<div class="row"><span>Sets settled</span><span class="g">'+pos.completeSetsSettled+'</span></div>';
    pc += '<div class="row"><span>Maker PnL</span><span class="'+cls(pos.makerPnl)+'">'+(pos.makerPnl>=0?'+':'')+f2(pos.makerPnl)+'</span></div>';
    pc += '<div class="row"><span>Top-ups (taker)</span><span>'+pos.takerTopUps+'</span></div>';
  } else {
    pc += '<div class="empty">No active position</div>';
  }
  pc += '</div>';
  document.getElementById('positionCard').innerHTML = pc;

  // Session card
  var sc = '<div class="card"><div class="card-title">Session</div>';
  sc += '<div class="row"><span>Start balance</span><span class="w">$'+f2(start)+'</span></div>';
  sc += '<div class="row"><span>Current balance</span><span class="w">$'+f2(bal)+'</span></div>';
  sc += '<div class="row"><span>Net PnL</span><span class="'+cls(pnl)+'">'+(pnl>=0?'+':'')+f2(pnl)+'</span></div>';
  sc += '<div class="row"><span>Maker PnL (session)</span><span class="'+cls(sess.makerPnl)+'">'+(sess.makerPnl>=0?'+':'')+f2(sess.makerPnl||0)+'</span></div>';
  sc += '<div class="row"><span>Settle PnL (session)</span><span class="'+cls(sess.settlePnl)+'">'+(sess.settlePnl>=0?'+':'')+f2(sess.settlePnl||0)+'</span></div>';
  sc += '<div class="row"><span>Sets traded</span><span class="g">'+(sess.sets||0)+'</span></div>';
  sc += '<div class="row"><span>Top-ups</span><span>'+(sess.topUps||0)+'</span></div>';
  sc += '<div class="row"><span>Active markets</span><span class="b">'+(d.activeMarkets||0)+'</span></div>';
  sc += '<div class="row"><span>Tick #</span><span class="b">'+(d.tickCount||0)+'</span></div>';
  sc += '</div>';
  document.getElementById('sessionCard').innerHTML = sc;

  // Fills
  var fills = d.recentFills || [];
  var fc = '<div class="card"><div class="card-title">Recent Fills <span>'+fills.length+'</span></div>';
  if(fills.length === 0){
    fc += '<div class="empty">No fills yet</div>';
  } else {
    for(var i=0; i<Math.min(fills.length,30); i++){
      var f = fills[i];
      var isBuy = f.action === 'BUY';
      var legCls = f.leg === 'UP' ? 'g' : 'r';
      fc += '<div class="fill-row">';
      fc += '<span style="color:#8b949e;font-size:9px">'+f.ts+'</span>';
      fc += '<span class="'+(isBuy?'b':'y')+'" style="font-weight:700;font-size:9px">'+f.action+'</span>';
      fc += '<span class="'+legCls+'" style="font-weight:700;font-size:9px">'+f.leg+'</span>';
      fc += '<span>'+f.shares+'sh @ $'+f4(f.price)+'</span>';
      if(f.pnl !== undefined) fc += '<span class="'+cls(f.pnl)+'" style="margin-left:auto">'+(f.pnl>=0?'+':'')+f2(f.pnl)+'</span>';
      if(f.bal !== undefined) fc += '<span style="color:#8b949e;font-size:9px">bal:$'+f2(f.bal)+'</span>';
      fc += '</div>';
    }
  }
  fc += '</div>';
  document.getElementById('fillsCard').innerHTML = fc;

  // Activity log
  var logs = d.activityLog || [];
  var lc = '<div class="card"><div class="card-title">Activity Log <span>'+logs.length+'</span></div>';
  if(logs.length === 0){
    lc += '<div class="empty">No activity yet</div>';
  } else {
    for(var i=0; i<Math.min(logs.length,50); i++){
      lc += '<div class="log-line">'+logs[i].replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';
    }
  }
  lc += '</div>';
  document.getElementById('logCard').innerHTML = lc;

  // Footer
  var up = d.uptime || 0;
  var upStr = up>3600 ? Math.floor(up/3600)+'h '+Math.floor((up%3600)/60)+'m' : up>60 ? Math.floor(up/60)+'m '+(up%60)+'s' : up+'s';
  document.getElementById('footer').textContent = 'uptime: '+upStr+' | ticks: '+(d.tickCount||0)+' | commit: '+(d.commitVersion||'?');
}

socket.on('connect', function(){ document.getElementById('dot').className = 'dot on'; });
socket.on('disconnect', function(){ document.getElementById('dot').className = 'dot off'; });
socket.on('snapshot', function(d){ if(d) render(d); });

setInterval(function(){
  fetch('/api/snapshot').then(function(r){ return r.json(); }).then(function(d){ if(d) render(d); }).catch(function(){});
}, 3000);
})();
</script>
</body>
</html>
