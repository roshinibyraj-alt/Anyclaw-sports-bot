<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Polymarket Sports Bot</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06060a;--bg2:#0d0d14;--bg3:#13131e;--border:#1e1e2e;--green:#00e676;--red:#ff3d57;--white:#eeeef8;--muted:#55556a;--dim:#2a2a40}
body{background:var(--bg);color:var(--white);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;overflow-x:hidden}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.dot{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0}
.dot.off{background:var(--red)}
main{padding:8px;max-width:800px;margin:0 auto}
.section{margin-bottom:8px}
.stitle{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);border-bottom:1px solid var(--border);padding:4px 0;margin-bottom:6px;text-transform:uppercase;display:flex;justify-content:space-between}
.grid{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:600px){.grid{grid-template-columns:1fr 1fr}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px;content-visibility:auto}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.ct{font-size:13px;font-weight:700}
.cb{font-size:14px;font-weight:700;text-align:right}
.cp{font-size:10px;margin-bottom:6px}
.cp.pos{color:var(--green)}
.cp.neg{color:var(--red)}
.match{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 8px;margin-bottom:4px}
.mh{display:flex;justify-content:space-between;align-items:center;gap:4px;flex-wrap:wrap}
.mt{font-size:11px;font-weight:600;flex:1}
.mt .live{color:var(--red);font-size:8px;margin-left:3px}
.mpr{display:flex;gap:3px;flex-wrap:wrap;margin:3px 0}
.mpr .mp{background:var(--dim);padding:2px 6px;border-radius:4px;font-size:10px;text-align:center}
.mp-l{font-weight:600;font-size:8px;color:var(--muted)}
.mp-v{font-size:10px}
.m-cd{font-size:14px;font-weight:700;color:var(--green);margin-left:auto}
.pos-box{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.pos-pnl{font-weight:700}
.pos-pnl.pos{color:var(--green)}
.pos-pnl.neg{color:var(--red)}
.tf{max-height:180px;overflow-y:auto}
.tr{font-size:10px;display:flex;align-items:center;gap:4px;padding:2px 4px;margin-bottom:1px;background:var(--bg3);border-radius:3px}
.tr.w{background:#00e67606}
.tr.l{background:#ff3d5706}
.tr .ty{font-size:7px;padding:1px 3px;border-radius:2px;background:var(--dim);flex-shrink:0}
.tr .nm{font-weight:600;font-size:9px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tr .pn{font-weight:700;font-size:10px}
.tr .pn.g{color:var(--green)}
.tr .pn.r{color:var(--red)}
.tr .tm{font-size:8px;color:var(--muted);flex-shrink:0}
.empty{padding:12px;text-align:center;color:var(--muted);font-size:11px}
footer{text-align:center;padding:12px;font-size:9px;color:var(--muted)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}
</style>
</head>
<body>
<header>
  <div class="dot" id="dot"></div>
  <div><span style="font-size:15px;font-weight:700">Polymarket</span><br><span style="font-size:9px;color:var(--muted)" id="status">Connecting...</span></div>
  <div style="display:flex;gap:10px;margin-left:auto;flex-wrap:wrap" id="hdrs"></div>
</header>
<main>
  <div class="section"><div class="stitle">Sports <span id="spsum" style="font-size:9px;letter-spacing:0;color:var(--muted)"></span></div>
  <div class="grid" id="sg"></div>
  <div class="section" style="margin-top:8px"><div class="stitle">FIFA World Cup <span id="fcn" style="font-size:9px;color:var(--muted)"></span></div>
  <div id="fc"></div>
</main>
<footer>Polymarket Bot v1.0</footer>
<script>
(function(){
var s=io({transports:['websocket','polling']});
var dot=document.getElementById('dot'),st=document.getElementById('status');
s.on('connect',function(){dot.className='dot';st.textContent='Live'});
s.on('disconnect',function(){dot.className='dot off';st.textContent='Offline'});
s.on('snapshot',function(d){if(!d)return;r(d)});
var _timer=null,_snap=null,_cache={};

function qs(a,b){return a?document.querySelector('#'+a+' .'+b):null}
function txt(el,v){if(el&&el.textContent!==v)el.textContent=v}

function r(d){
  _snap=d;
  var sp=d.sports||{},fm=d.fifaMatches||[];
  // Header balances
  var h='',tt=0;
  Object.keys(sp).forEach(function(k){
    var sc=sp[k];if(!sc)return;
    var b=sc.floatingBalance!=null?sc.floatingBalance:sc.balance;
    var pn=(b||0)-(2000);
    h+='<div style="text-align:right"><span style="font-size:8px;color:var(--muted)">'+sc.label+'</span><br><span style="font-size:13px;font-weight:700;color:'+(pn>=0?'var(--green)':'var(--red)')+'">$'+(b||0).toFixed(0)+'</span></div>';
    tt+=(sc.wins||0)+(sc.losses||0);
  });
  document.getElementById('hdrs').innerHTML=h;
  document.getElementById('spsum').textContent=tt+' trades';

  // Sports panels - targeted updates
  var sg=document.getElementById('sg');
  // Build skeleton on first render
  var firstBuild=!_cache._built;
  Object.keys(sp).forEach(function(k){
    var sc=sp[k];if(!sc)return;
    var card=document.getElementById('card-'+k);
    if(!card){
      card=document.createElement('div');card.id='card-'+k;card.className='card';
      card.innerHTML='<div class="ch"><div class="ct">'+sc.label+'</div><div class="cb" id="cb-'+k+'">$0</div></div>'+
        '<div class="cp" id="cp-'+k+'"></div>'+
        '<div id="mm-'+k+'"></div>'+
        '<div class="stitle" style="font-size:9px;margin:6px 0 3px">Trades</div><div id="th-'+k+'"><div class="empty">No trades</div></div>';
      sg.appendChild(card);
    }
    var b=sc.floatingBalance!=null?sc.floatingBalance:sc.balance;
    txt(document.getElementById('cb-'+k), '$'+b.toFixed(2));
    var pnl=sc.totalPnl||0, tt2=(sc.wins||0)+(sc.losses||0);
    var wr=tt2>0?(sc.wins/tt2*100).toFixed(0)+'%':'-';
    var cpEl=document.getElementById('cp-'+k);
    var cpT='P&L: '+(pnl>=0?'+':'')+'$'+pnl.toFixed(2)+' | W'+(sc.wins||0)+'/L'+(sc.losses||0)+' ('+wr+')';
    cpEl.className='cp '+(pnl>=0?'pos':'neg');
    txt(cpEl, cpT);

    // Matches
    var mm=document.getElementById('mm-'+k);
    var mh='';
    if(sc.matches)sc.matches.forEach(function(m){
      var c='';
      if(m.countdown!=null&&m.countdown>0&&!m.isLive){
        var hh=Math.floor(m.countdown/3600), mm=Math.floor((m.countdown%3600)/60), ss=m.countdown%60;
        c=' <span class="m-cd" data-cd="'+m.countdown+'">'+hh.toString().padStart(2,'0')+':'+mm.toString().padStart(2,'0')+':'+ss.toString().padStart(2,'0')+'</span>';
      }
      mh+='<div class="match"><div class="mh"><div class="mt">'+(m.title||'')+(m.isLive?'<span class="live">🔴 LIVE</span>':'')+'</div>'+c+'</div>'+
        '<div class="mh"><div class="mpr">'+(m.prices?m.prices.map(function(p){return'<span style="background:var(--dim);padding:1px 5px;border-radius:3px">'+p.toFixed(3)+'</span>'}).join(''):'')+'</div></div>';
      if(m.openPosition){
        var pc=(m.livePnl||0)>=0?'pos':'neg';
        mh+='<div class="pos-box"><span>📈 '+(m.openPosition.side||'')+' @ '+(m.openPosition.entryPrice||0).toFixed(3)+'</span><span class="pos-pnl '+pc+'">'+((m.livePnl||0)>=0?'+':'')+(m.livePnl||0).toFixed(2)+'</span></div>';
      }
      mh+='</div>';
    });
    mm.innerHTML=mh;

    // Trade history
    var th=document.getElementById('th-'+k);
    if(sc.recentTrades&&sc.recentTrades.length){
      th.innerHTML='<div class="tf">'+sc.recentTrades.slice().reverse().slice(0,15).map(function(t){
        var c=t.type==='ENTRY'?'':(t.won?'w':'l'),p='';
        if(t.type!=='ENTRY')p=' <span class="pn '+(t.pnl>=0?'g':'r')+'">'+(t.pnl>=0?'+':'')+(t.pnl||0).toFixed(2)+'</span>';
        var n=t.name||t.side||'';
        return '<div class="tr '+c+'"><span class="ty">'+(t.type||'')+'</span><span class="nm">'+n+'</span>'+p+'<span class="tm">'+(t.at?t.at.slice(11,19):'')+'</span></div>';
      }).join('')+'</div>';
    }else{th.innerHTML='<div class="empty">No trades</div>';}
  });
  _cache._built=true;

  // FIFA
  var fc=document.getElementById('fc'), fcn=document.getElementById('fcn');
  if(!fm.length){fc.innerHTML='<div class="empty">Waiting for matches...</div>';fcn.textContent='';return;}
  fcn.textContent='('+fm.length+')';
  var fh='';
  fm.forEach(function(m){
    var pos=m.openPosition, lp=m.livePnl||0;
    var cd='';
    if(m.countdown!=null&&m.countdown>0){
      var hh=Math.floor(m.countdown/3600), mm=Math.floor((m.countdown%3600)/60), ss=m.countdown%60;
      cd=' <span class="m-cd" data-cd="'+m.countdown+'" style="font-size:16px;font-weight:700;color:var(--green)">'+hh.toString().padStart(2,'0')+':'+mm.toString().padStart(2,'0')+':'+ss.toString().padStart(2,'0')+'</span>';
    }
    var mkth='';
    if(m.fifaMarkets&&m.fifaMarkets.length){
      mkth='<div class="mpr">';
      m.fifaMarkets.forEach(function(mk){
        var label=mk.id.charAt(0).toUpperCase()+mk.id.slice(1);
        var aCol=mk.priceA>=0.5?'color:var(--green)':'color:var(--red)';
        var bCol=mk.priceB>=0.5?'color:var(--green)':'color:var(--red)';
        mkth+='<div class="mp"><div class="mp-l">'+label+'</div><div class="mp-v"><span style="'+aCol+'">'+(mk.priceA||0).toFixed(3)+'</span> / <span style="'+bCol+'">'+(mk.priceB||0).toFixed(3)+'</span></div></div>';
      });
      mkth+='</div>';
    }
    var rh='';
    if(m.lastEntryReason) rh='<div style="font-size:8px;color:var(--muted);margin:2px 0">'+m.lastEntryReason+'</div>';
    var ph='';
    if(pos){
      var pc=lp>=0?'pos':'neg';
      var sn=(pos.side||'')==='B'?'NO':'YES';
      ph='<div class="pos-box"><span>📈 '+sn+' @ '+(pos.entryPrice||0).toFixed(3)+
        ' | TP:'+(pos.tpPrice||0).toFixed(3)+' SL:'+(pos.stopPrice||0).toFixed(3)+
        '</span><span class="pos-pnl '+pc+'">'+(lp>=0?'+':'')+lp.toFixed(2)+'</span></div>';
    }
    var wr=m.totalTrades>0?(m.wins/m.totalTrades*100).toFixed(0)+'%':'-';
    var bal=m.floatingBalance!=null?m.floatingBalance:m.balance;
    fh+='<div class="match"><div class="mh"><div class="mt">'+(m.label||'')+cd+'</div>'+
      '<div style="font-size:10px;color:var(--muted)">$'+(bal||0).toFixed(0)+
      ' | W'+(m.wins||0)+'/L'+(m.losses||0)+' ('+wr+')</div></div>'+
      mkth+rh+ph+
      '<div style="font-size:8px;color:var(--muted);margin-top:2px">P&L: '+(m.totalPnl>=0?'+':'')+'$'+(m.totalPnl||0).toFixed(2)+
      ' | Fees: $'+(m.totalFees||0).toFixed(2)+'</div></div>';
  });
  fc.innerHTML=fh;

  // Live countdown ticker
  if(_timer)clearInterval(_timer);
  _timer=setInterval(function(){
    document.querySelectorAll('.m-cd').forEach(function(el){
      var t=parseInt(el.getAttribute('data-cd'));
      if(t>0){t--;el.setAttribute('data-cd',t);
        var hh=Math.floor(t/3600), mm=Math.floor((t%3600)/60), ss=t%60;
        el.textContent=hh.toString().padStart(2,'0')+':'+mm.toString().padStart(2,'0')+':'+ss.toString().padStart(2,'0');}
    });
  },1000);
}
})();
</script>
</body>
</html>
